{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Puzzle Hints</title>
        <link rel="stylesheet" href="{% static 'css/style.css' %}" />
    </head>
    <body>
        {% if not is_available %}
        <div class="hint-timer-banner">
            <p>available in <strong id="countdown">{{ days_until_unlock }}</strong> day{{ days_until_unlock|pluralize }}</p>
        </div>
        {% endif %}

        <h1>Hint 5</h1>
        <div>
            <p>This is the fifth hint. It provides some guidance on how to approach the puzzle.</p>
        </div>

        <script src="{% static 'js/script.js' %}"></script>
    </body>
</html>
