{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Hints</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}" />
  </head>
  <body>
    <h1>Puzzle Hints</h1>
    <div class="hints-grid">
      {% for hint_number in hint_numbers %}
        <a class="hint-box" href="{% url 'hint-page' hint_number %}" aria-label="Open hint {{ hint_number }}">Hint {{ hint_number }}</a>
      {% endfor %}
    </div>

    <script src="{% static 'js/script.js' %}"></script>
  </body>
</html>
