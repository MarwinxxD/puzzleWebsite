<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Puzzle Hints</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Puzzle Hints</h1>
    <div class="hints-grid">
      <button class="hint-box" data-hint="1" aria-label="Open hint 1">Hint 1</button>
      <button class="hint-box" data-hint="2" aria-label="Open hint 2">Hint 2</button>
      <button class="hint-box" data-hint="3" aria-label="Open hint 3">Hint 3</button>
      <button class="hint-box" data-hint="4" aria-label="Open hint 4">Hint 4</button>
      <button class="hint-box" data-hint="5" aria-label="Open hint 5">Hint 5</button>
      <button class="hint-box" data-hint="6" aria-label="Open hint 6">Hint 6</button>
      <button class="hint-box" data-hint="7" aria-label="Open hint 7">Hint 7</button>
      <button class="hint-box" data-hint="8" aria-label="Open hint 8">Hint 8</button>
      <button class="hint-box" data-hint="9" aria-label="Open hint 9">Hint 9</button>
      <button class="hint-box" data-hint="10" aria-label="Open hint 10">Hint 10</button>
    </div>

    <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title" aria-describedby="modal-body">
      <div class="modal-content">
        <button class="modal-close" id="modal-close" aria-label="Close">&times;</button>
        <h2 id="modal-title"></h2>
        <p id="modal-body"></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
